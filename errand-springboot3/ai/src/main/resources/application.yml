server:
  port: 8082

langchain4j:
  open-ai:
    chat-model:
      # 指向智谱 AI 的 OpenAI 兼容接口
      base-url: https://open.bigmodel.cn/api/paas/v4/
      api-key: 68bc0f4931914c0bb0a64503cd71e980.7XNkffCZcQvFFZ4P
      model-name: glm-4.5-air
      log-requests: true
      log-responses: true
      timeout: 60s
    streaming-chat-model:
      base-url: https://open.bigmodel.cn/api/paas/v4/
      api-key: 68bc0f4931914c0bb0a64503cd71e980.7XNkffCZcQvFFZ4P
      model-name: glm-4.5-air
      log-requests: true
      log-responses: true
