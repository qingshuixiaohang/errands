# ================= 日志配置 =================
logging:
  level:
    dev.langchain4j: DEBUG
    fun.cyhgraph: DEBUG
    # 注释掉 embedding-model 配置，使用本地的 BgeSmallEnV15QuantizedEmbeddingModel
    # embedding-model: 使用 AiConfig 中的本地模型
#    embedding-model:
#      base-url: https://open.bigmodel.cn/api/paas/v4/
#      api-key: your_zhipu_api_key
#      model-name: embedding-2
spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: ${hanye.datasource.driver-class-name}
    url: ${hanye.datasource.url}
    username: ${hanye.datasource.username}
    password: ${hanye.datasource.password}
  data:
    redis:
      host: ${hanye.redis.host}
      port: ${hanye.redis.port}
      password: ${hanye.redis.password}
      database: ${hanye.redis.database}
